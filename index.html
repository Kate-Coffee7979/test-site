<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 사이트</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .open-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; }
        
        /* 팝업창 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .modal-btn { display: block; margin: 10px auto; padding: 10px 20px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <button class="open-btn" onclick="document.getElementById('myModal').style.display='flex'">팝업 열기</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3>인스타그램 팝업</h3>
            <p>버튼을 누르면 테스트가 시작됩니다.</p>
            
            <!-- 아래 버튼이 핵심입니다 -->
            <button class="modal-btn" onclick="alert('성공! 인스타그램으로 넘어가지 않습니다.');">
                인스타그램 열기 (테스트용)
            </button>
            
            <button class="modal-btn" onclick="document.getElementById('myModal').style.display='none'">
                닫기
            </button>
        </div>
    </div>

</body>
</html>
