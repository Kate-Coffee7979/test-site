        .shop-addr {

        /* --- 기능 관련 스크립트 --- */
        const audio = document.getElementById('cafeAudio');
        const playBtn = document.getElementById('playBtn');

        function toggleAudio() {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                }).catch(err => console.log("Play blocked"));
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play" style="margin-left: 2px;"></i>';
            }
        }

        audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });

        function openArchive() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-container').classList.add('visible');
            renderNav(); 
            renderList();
        }

        function goBack() { 
            document.getElementById('landing').classList.remove('hidden'); 
            document.getElementById('main-container').classList.remove('visible');
        }

        const areaOrder = ['Melbourne CBD', 'North Melbourne', 'North Melbourne / Prahran', 'Carlton', 'Fitzroy & Collingwood', 'South Melbourne & South Yarra', 'Brunswick', 'Hawthorn'];
        let currentFilter = 'korean';
        let currentSearchQuery = '';

        function renderNav() {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = `
                <button class="nav-icon-btn ${currentFilter === 'korean' ? 'active' : ''}" onclick="setFilter('korean')"><span class="nav-label">KOR</span></button>
                <button class="nav-icon-btn ${currentFilter === 'local' ? 'active' : ''}" onclick="setFilter('local')"><span class="nav-label">MELB</span></button>
            `;
        }

        function setFilter(f) { currentFilter = f; renderNav(); renderList(); }
        function handleSearch(v) { currentSearchQuery = v.toLowerCase(); renderList(); }

        function triggerMap(btn, url) {
            if(btn.classList.contains('animating')) return;
            btn.classList.add('animating');
            setTimeout(() => {
                window.open(url, '_blank');
                setTimeout(() => btn.classList.remove('animating'), 300);
            }, 950);
        }

        function renderList() {
            const container = document.getElementById('shop-list');
            const isKo = currentFilter === 'korean';

            const filteredData = database.filter(s => s.name.toLowerCase().includes(currentSearchQuery) || s.addr.toLowerCase().includes(currentSearchQuery));
            const grouped = filteredData.reduce((acc, s) => { if(!acc[s.area]) acc[s.area]=[]; acc[s.area].push(s); return acc; }, {});
            
            const sortedAreas = Object.keys(grouped).sort((a,b) => {
                let idxA = areaOrder.indexOf(a); let idxB = areaOrder.indexOf(b);
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            container.innerHTML = sortedAreas.map(area => `
                <div class="area-section">
                    <h3 class="area-header">${area}</h3>
                    ${grouped[area].sort((a,b)=>a.rank-b.rank).map(shop => {
                        const googleUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + area)}`;
                        const instaUrl = shop.ig.startsWith('http') ? shop.ig : `https://www.instagram.com/${shop.ig}`;
                        
                        let formattedAddr = shop.addr;
                        if(shop.name.includes("Code Black")) {
                            formattedAddr = shop.addr.replace("South Melbourne", "<br>South Melbourne / North Melbourne");
                        } else {
                            formattedAddr = shop.addr.replace(/South Melbourne/g, '<br>South Melbourne').replace(/North Melbourne/g, '<br>North Melbourne');
                        }

                        return `
                        <div class="shop-item">
                            <div class="shop-addr">${formattedAddr}</div>
                            <h2 class="shop-name">${shop.name}</h2>
                            
                            <div class="action-group">
                                <span class="btn-text">Open Scene</span>
                                <button class="icon-btn" onclick="window.open('${instaUrl}', '_blank')" title="Instagram">
                                    <svg class="btn-icon-svg"><use href="#icon-insta"></use></svg>
                                </button>
                                <button class="icon-btn" onclick="triggerMap(this, '${googleUrl}')" title="Google Maps">
                                    <div class="steam-wrap">
                                        <svg width="20" height="20" viewBox="0 0 24 24">
                                            <path class="steam-line" d="M8 8 Q9 4 8 0" />
                                            <path class="steam-line" d="M12 8 Q13 4 12 0" />
                                            <path class="steam-line" d="M16 8 Q17 4 16 0" />
                                        </svg>
                                    </div>
                                    <svg class="btn-icon-svg"><use href="#icon-cup-small"></use></svg>
                                </button>
                            </div>

                            <div class="shop-weather-box">${isKo ? shop.weather_ko : shop.weather_en}</div>
                            
                            <div class="info-row">
                                <span class="info-label">Roasters</span>
                                <div class="info-content">${shop.roaster}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Scene</span>
                                <div class="info-content">${isKo ? shop.desc_ko : shop.desc_en}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Signature</span>
                                <div class="info-content">${shop.sig}</div>
                            </div>

                            ${shop.mapIframe ? `
                                <div class="map-container">
                                    ${shop.mapIframe}
                                </div>
                            ` : ''}
                        </div>
                    `}).join('')}
                </div>
            `).join('');
            
            setTimeout(handleScroll, 100);
        }

        function handleScroll() {
            document.querySelectorAll('.shop-item').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
            });
        }
        window.addEventListener('scroll', handleScroll);
    </script>
