<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>인스타 테스트</title>
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { position: relative; width: 90%; height: 80%; margin: 5% auto; background: white; }
        iframe { width: 100%; height: 90%; border: none; }
        button { padding: 10px; }
    </style>
</head>
<body>

    <button onclick="document.getElementById('myModal').style.display='block'">인스타그램 열기</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <button onclick="document.getElementById('myModal').style.display='none'">닫기</button>
            <iframe src="https://www.instagram.com/"></iframe>
        </div>
    </div>

</body>
</html>
