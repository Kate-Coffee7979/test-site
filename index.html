<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>테스트</title>
</head>
<body>

    <!-- 버튼 -->
    <button onclick="showPopup()" style="padding: 20px; font-size: 20px;">
        팝업 열기
    </button>

    <!-- 팝업창 (처음엔 숨겨짐) -->
    <div id="myPopup" style="display:none; position:fixed; top:20%; left:10%; width:80%; padding:20px; background:white; border:2px solid black; text-align:center;">
        <p>테스트 팝업창입니다!</p>
        <button onclick="alert('성공! 인스타로 넘어가지 않음');">인스타그램 열기</button>
        <button onclick="closePopup()">닫기</button>
    </div>

    <!-- 기능 -->
    <script>
        function showPopup() {
            document.getElementById('myPopup').style.display = 'block';
        }
        function closePopup() {
            document.getElementById('myPopup').style.display = 'none';
        }
    </script>

</body>
</html>
