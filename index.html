<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인스타그램 팝업 테스트</title>
    <style>
        /* 배경 및 전체 레이아웃 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 테스트용 메인 화면 버튼 */
        .open-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .open-btn:active {
            transform: scale(0.95);
        }

        /* 팝업창 전체 배경 (어둡게 처리) */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none; /* 처음엔 숨김 */
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* 인스타그램 스타일 팝업 박스 */
        .popup-content {
            background-color: white;
            width: 300px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: popupAnimation 0.3s ease-out;
        }

        @keyframes popupAnimation {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 팝업 텍스트 영역 */
        .popup-text {
            padding: 32px 24px;
        }
        .popup-text h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 600;
            color: #262626;
        }
        .popup-text p {
            margin: 0;
            font-size: 14px;
            color: #8e8e8e;
            line-height: 1.4;
        }

        /* 팝업 버튼들 (가로선 구분) */
        .popup-buttons {
            border-top: 1px solid #dbdbdb;
            display: flex;
            flex-direction: column;
        }
        .popup-btn {
            background: none;
            border: none;
            padding: 14px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        /* 인스타로 이동하는 버튼 (디자인 유지하되 클릭 시 안 넘어가게 세팅) */
        .popup-btn.go-insta {
            color: #0095f6;
            font-weight: bold;
            border-bottom: 1px solid #dbdbdb;
        }
        /* 닫기 버튼 */
        .popup-btn.close-popup {
            color: #262626;
        }
    </style>
</head>
<body>

    <button class="open-btn" onclick="openPopup()">인스타 팝업 열기</button>

    <div class="popup-overlay" id="instaPopup">
        <div class="popup-content">
            <div class="popup-text">
                <h2>인스타그램 테스트</h2>
                <p>아래 버튼을 눌러도 실제 인스타그램으로 넘어가지 않는 테스트용 화면입니다.</p>
            </div>
            <div class="popup-buttons">
